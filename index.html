<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Summarizer | TheIdealist</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 90%; max-width: 600px; border: 1px solid #333; }
        h1 { color: #fff; font-weight: 600; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #444; background: #262626; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #output { margin-top: 20px; padding: 15px; background: #262626; border-radius: 8px; line-height: 1.6; min-height: 50px; border-left: 4px solid #007bff; white-space: pre-wrap; }
        .loader { color: #888; font-style: italic; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>YouTube AI Summarizer</h1>
    <input type="text" id="videoUrl" placeholder="Enter YouTube Video URL...">
    <button onclick="sendData()">Generate Summary</button>
    <div id="loader" class="loader">Extracting transcript and generating 10 bullet points... (this takes ~30s)</div>
    <div id="output">Summary will appear here.</div>
</div>

<script>
    async function sendData() {
        const url = document.getElementById('videoUrl').value;
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!url) { alert("Please enter a URL"); return; }

        loader.style.display = "block";
        output.innerText = "";

        try {
            // REPLACE THE URL BELOW WITH YOUR n8n TEST WEBHOOK URL
            const response = await fetch('http://localhost:5678/webhook-test/summarize-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ videoUrl: url })
            });

            if (!response.ok) throw new Error("Server responded with an error");

            const data = await response.json();
            loader.style.display = "none";
            output.innerText = data.summary;
        } catch (error) {
            loader.style.display = "none";
            output.innerText = "Error: " + error.message;
        }
    }
</script>

</body>
</html>
