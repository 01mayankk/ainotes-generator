<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Summarizer</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #00ffcc; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 30px; max-width: 600px; line-height: 1.6; background: #1e1e1e; padding: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <h1>Video Summarizer</h1>
    <input type="text" id="videoLink" placeholder="Paste YouTube link here...">
    <button onclick="getSummary()" id="btn">Get AI Summary</button>
    <div id="result"></div>

    <script>
        async function getSummary() {
            const link = document.getElementById('videoLink').value;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch('YOUR_N8N_WEBHOOK_URL', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "youtube_link": link }) // Match the field name in n8n
                });

                const data = await response.text(); // Use .text() if n8n returns HTML
                resultDiv.style.display = "block";
                resultDiv.innerHTML = data;
            } catch (error) {
                resultDiv.innerHTML = "Error connecting to AI.";
            }
            btn.innerText = "Get AI Summary";
            btn.disabled = false;
        }
    </script>
</body>
</html>
