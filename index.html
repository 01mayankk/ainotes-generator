<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Notes Generator</title>

<!-- ✅ Markdown Renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 800px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.input-box {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3b82f6, #9333ea);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* 🔥 Output styling */
#output {
  margin-top: 20px;
  padding: 25px;
  background: rgba(0,0,0,0.4);
  border-radius: 12px;
  max-height: 400px;
  overflow-y: auto;
  line-height: 1.6;
}

/* Markdown styling */
#output h2 {
  color: #60a5fa;
  margin-top: 15px;
}

#output h3 {
  color: #c084fc;
  margin-top: 12px;
}

#output strong {
  color: #facc15;
}

#output ul {
  padding-left: 20px;
}

#output li {
  margin-bottom: 6px;
}

#output code {
  background: rgba(255,255,255,0.1);
  padding: 3px 6px;
  border-radius: 5px;
}

/* Loader */
.loader {
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
  <h1>📘 AI Notes Generator</h1>

  <div class="input-box">
    <input id="topic" placeholder="Enter topic (Heap, Graph, DP)" />
    <button onclick="generate()">Generate</button>
  </div>

  <div id="output">✨ Your AI-generated notes will appear here...</div>
</div>

<script>
async function generate() {
  const topic = document.getElementById("topic").value.trim();
  const output = document.getElementById("output");

  if (!topic) {
    output.innerText = "⚠️ Please enter a topic!";
    return;
  }

  output.innerHTML = '<div class="loader"></div>';

  try {
    const res = await fetch("https://jackknife-iodine-harmonica.ngrok-free.dev/webhook/notes-generator", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ topic })
    });

    const data = await res.json();

    const text =
      data?.candidates?.[0]?.content?.parts?.[0]?.text ||
      "⚠️ No response received";

    // 🔥 Render Markdown as HTML
    output.innerHTML = marked.parse(text);

  } catch (err) {
    output.innerText = "❌ Error: " + err.message;
  }
}
</script>

</body>
</html>
